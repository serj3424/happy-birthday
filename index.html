<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>С Днём Рождения! Тепло и нежность</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #fff8f8 0%, #ffe8e8 100%);
            font-family: 'Quicksand', sans-serif;
            overflow-x: hidden;
            position: relative;
            color: #a1222b;
        }

        /* главный контейнер */
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 2rem 1.8rem 4rem;
            position: relative;
            z-index: 10;
        }

        /* заголовок */
        .hero {
            text-align: center;
            margin-bottom: 2.5rem;
            animation: softReveal 0.9s ease-out;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.8rem;
            font-weight: 900;
            background: linear-gradient(125deg, #b81c1c, #e65c5c, #c62828);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 4px 15px rgba(198, 40, 40, 0.15);
            letter-spacing: -0.3px;
        }

        .hero p {
            font-size: 1.3rem;
            margin-top: 0.7rem;
            color: #bf4b4b;
            font-weight: 500;
            background: rgba(255, 245, 245, 0.6);
            display: inline-block;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            backdrop-filter: blur(3px);
        }

        /* сетка карточек */
        .wishes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 2rem;
            margin: 2.5rem 0 2rem;
        }

        .wish-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(6px);
            border-radius: 42px 18px 42px 18px;
            padding: 1.8rem 1.5rem;
            box-shadow: 0 20px 32px -12px rgba(150, 30, 30, 0.2);
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(255, 190, 190, 0.7);
            text-align: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .wish-card:hover {
            transform: translateY(-8px) scale(1.01);
            background: #ffffff;
            box-shadow: 0 28px 38px -14px rgba(170, 40, 40, 0.35);
            border-color: #ffacac;
        }

        /* разнообразные иконки вместо сердец */
        .wish-icon {
            font-size: 2.7rem;
            display: inline-block;
            margin-bottom: 0.9rem;
            transition: transform 0.2s ease;
            filter: drop-shadow(0 2px 6px rgba(200, 70, 70, 0.3));
        }

        .wish-card:hover .wish-icon {
            transform: scale(1.08) rotate(2deg);
        }

        .wish-card h3 {
            font-size: 1.65rem;
            font-weight: 700;
            color: #bc3f2e;
            margin-bottom: 0.7rem;
            font-family: 'Playfair Display', serif;
        }

        .wish-text {
            font-size: 1rem;
            line-height: 1.5;
            color: #632e2c;
            font-weight: 500;
        }

        /* блок любви */
        .love-message {
            background: rgba(210, 70, 70, 0.1);
            border-radius: 50px;
            padding: 1.5rem 1.8rem;
            margin: 2.2rem 0 1.5rem;
            text-align: center;
            border: 1px solid #ffb4b4;
            backdrop-filter: blur(4px);
            transition: all 0.2s;
        }

        .love-message p {
            font-size: 1.3rem;
            font-weight: 600;
            color: #b82b2b;
            letter-spacing: -0.2px;
        }

        /* кнопка запуска сердец (но сердец стало значительно меньше) */
        .gentle-btn {
            background: linear-gradient(105deg, #c53a2f, #e06262);
            border: none;
            padding: 12px 32px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.25s;
            box-shadow: 0 8px 18px rgba(180, 50, 50, 0.3);
            margin-top: 12px;
            font-family: 'Quicksand', sans-serif;
        }

        .gentle-btn:hover {
            transform: scale(1.02);
            background: linear-gradient(105deg, #b32d21, #d44f4f);
            box-shadow: 0 12px 22px rgba(190, 40, 40, 0.4);
        }

        footer {
            text-align: center;
            margin-top: 3rem;
            font-size: 0.9rem;
            color: #c46262;
            font-weight: 500;
        }

        /* анимации */
        @keyframes softReveal {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* парящие элементы (теперь тут реже сердечки, добавим звёздочки, цветочки) */
        .floating-ambient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9998;
            overflow: hidden;
        }

        .float-item {
            position: absolute;
            font-size: 22px;
            opacity: 0.55;
            animation: floatSoft 12s linear forwards;
            filter: drop-shadow(0 0 3px rgba(255,100,100,0.3));
        }

        @keyframes floatSoft {
            0% {
                transform: translateY(100vh) scale(0.6) rotate(0deg);
                opacity: 0.6;
            }
            100% {
                transform: translateY(-15vh) scale(1) rotate(12deg);
                opacity: 0;
            }
        }

        /* конфетти-эффект при клике (цветы/блестки) */
        .confetti-flower {
            position: fixed;
            width: 12px;
            height: 12px;
            background-color: #f28b82;
            opacity: 0.9;
            pointer-events: none;
            z-index: 10001;
            border-radius: 50%;
            animation: fallBlossom 0.9s ease-out forwards;
        }

        @keyframes fallBlossom {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100px) rotate(200deg);
                opacity: 0;
            }
        }

        .cursor-spark {
            position: fixed;
            pointer-events: none;
            z-index: 10002;
            font-size: 18px;
            transform: translate(-50%, -50%);
            animation: fadeSpark 0.7s forwards;
        }

        @keyframes fadeSpark {
            0% { opacity: 0.8; transform: translate(-50%, -50%) scale(0.7); }
            100% { opacity: 0; transform: translate(-50%, -80%) scale(1.4); }
        }

        @media (max-width: 680px) {
            .hero h1 { font-size: 2.5rem; }
            .wish-card h3 { font-size: 1.35rem; }
            .love-message p { font-size: 1.05rem; }
        }
    </style>
</head>
<body>

<div class="floating-ambient" id="floatingAmbient"></div>

<div class="container">
    <div class="hero">
        <h1>✨ С Днём Рождения! ✨</h1>
        <p>💫 Пусть этот день согревает тебя любовью и нежностью 💫</p>
    </div>

    <div class="wishes-grid" id="wishesGrid"></div>

    <div class="love-message" id="loveMessage">
        <p>🌸 Ты — самое тёплое чудо в моей жизни. Будь счастлив(а) каждый миг! 🌸</p>
    </div>

    <div style="text-align: center;">
        <button class="gentle-btn" id="burstGentleBtn">💗 Немного сердечного волшебства 💗</button>
    </div>

    <footer>
        <span>🌹 С бесконечной любовью и самыми тёплыми пожеланиями (от Сережки) 🌹</span>
    </footer>
</div>

<script>
    // ---------- НОВЫЙ НАБОР ПОЖЕЛАНИЙ С РАЗНЫМИ КАРТИНКАМИ (иконками) ----------
    const wishesList = [
        { title: "🌼 Цветочное счастье", icon: "🌼🌸", text: "Пусть твоя жизнь цветёт яркими красками, как самый красивый сад!" },
        { title: "⭐ Звёздная магия", icon: "✨⭐", text: "Пусть звёзды исполняют твои самые сокровенные желания!" },
        { title: "🎁 Подарки судьбы", icon: "🎁🎀", text: "Желаю неожиданных приятных сюрпризов, исполнения мечт и дней, полных радостных открытий!" },
        { title: "🍀 Удача и радость", icon: "🍀🌈", text: "Желаю лёгкости на подъём, удачи во всех начинаниях!" },
        { title: "🍰 Сладкие мгновения", icon: "🍰🍭", text: "Пусть жизнь будет как самый вкусный торт: сладкой, яркой и с приятными сюрпризами внутри. Люблю тебя!" },
        { title: "🏆 Триумф и успех", icon: "🏆🎉", text: "Покоряй вершины, радуйся победам и знай: ты уникальна. Пусть удача всегда идёт рядом!" }
    ];

    // Построение карточек
    function buildWishes() {
        const grid = document.getElementById('wishesGrid');
        if (!grid) return;
        grid.innerHTML = '';
        wishesList.forEach((wish, idx) => {
            const card = document.createElement('div');
            card.className = 'wish-card';
            card.style.animation = `softReveal 0.45s ease-out ${idx * 0.04}s both`;
            card.innerHTML = `
                <div class="wish-icon">${wish.icon}</div>
                <h3>${wish.title}</h3>
                <div class="wish-text">${wish.text}</div>
            `;
            card.addEventListener('click', (e) => {
                // при клике на карточку – яркие лепестки/конфетти и всплывающее сообщение
                createBlossomBurst(e.clientX, e.clientY);
                showFloatingNote(wish.title);
                createMiniSpark(e.clientX, e.clientY);
            });
            grid.appendChild(card);
        });
    }

    // Эффект "цветочный дождь" вместо обилия сердец (красиво и нежно)
    function createBlossomBurst(x, y) {
        const count = 16; // умеренное количество
        for (let i = 0; i < count; i++) {
            const conf = document.createElement('div');
            conf.classList.add('confetti-flower');
            const colors = ['#ff9f9f', '#ffb7b2', '#f7a8a8', '#ffcdb0', '#f5a3c7', '#e6b0aa'];
            conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            conf.style.left = (x + (Math.random() - 0.5) * 45) + 'px';
            conf.style.top = (y + (Math.random() - 0.5) * 35) + 'px';
            conf.style.width = Math.random() * 10 + 6 + 'px';
            conf.style.height = Math.random() * 10 + 6 + 'px';
            conf.style.borderRadius = Math.random() > 0.5 ? '50%' : '30% 70% 70% 30% / 30% 40% 60% 70%';
            document.body.appendChild(conf);
            setTimeout(() => conf.remove(), 800);
        }
    }

    function showFloatingNote(title) {
        const toast = document.createElement('div');
        toast.innerText = `✨ ${title} ✨`;
        toast.style.position = 'fixed';
        toast.style.bottom = '25%';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.backgroundColor = '#fff3f0';
        toast.style.color = '#bc3f2e';
        toast.style.padding = '10px 26px';
        toast.style.borderRadius = '40px';
        toast.style.fontWeight = 'bold';
        toast.style.fontSize = '1.15rem';
        toast.style.boxShadow = '0 8px 22px rgba(170, 60, 60, 0.25)';
        toast.style.border = '1px solid #ffbbbb';
        toast.style.zIndex = '10020';
        toast.style.fontFamily = 'Quicksand, sans-serif';
        toast.style.backdropFilter = 'blur(12px)';
        toast.style.animation = 'softReveal 0.2s ease-out';
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transition = 'opacity 0.4s';
            setTimeout(() => toast.remove(), 450);
        }, 1500);
    }

    function createMiniSpark(x, y) {
        const spark = document.createElement('div');
        spark.className = 'cursor-spark';
        const icons = ['🌸', '🌺', '⭐', '✨', '🍃', '🌼', '💫', '🎈'];
        spark.innerHTML = icons[Math.floor(Math.random() * icons.length)];
        spark.style.left = x + 'px';
        spark.style.top = y + 'px';
        spark.style.fontSize = '20px';
        document.body.appendChild(spark);
        setTimeout(() => spark.remove(), 700);
    }

    // Фоновая атмосфера: 70% цветочки / звёздочки / листики, только 30% сердец (чтобы стало меньше сердец)
    let ambientInterval;
    function startAmbientElements() {
        if (ambientInterval) clearInterval(ambientInterval);
        ambientInterval = setInterval(() => {
            const container = document.getElementById('floatingAmbient');
            if (!container) return;
            const element = document.createElement('div');
            element.classList.add('float-item');
            // набор разных иконок: сердец будет около 30% от общего количества
            const natureIcons = ['🌸', '🌼', '🌺', '⭐', '✨', '🍀', '🌿', '🍃', '🎈', '💫', '🌹', '🌸', '🌟'];
            const heartIcons = ['❤️', '💖', '💗'];
            let chosenIcon;
            // делаем так, чтобы сердца появлялись реже: 25% вероятность сердца
            if (Math.random() < 0.25) {
                chosenIcon = heartIcons[Math.floor(Math.random() * heartIcons.length)];
            } else {
                chosenIcon = natureIcons[Math.floor(Math.random() * natureIcons.length)];
            }
            element.innerHTML = chosenIcon;
            const sizeVal = Math.random() * 26 + 16;
            element.style.fontSize = `${sizeVal}px`;
            element.style.left = Math.random() * 100 + '%';
            element.style.animationDuration = Math.random() * 9 + 6 + 's';
            element.style.animationDelay = Math.random() * 2 + 's';
            element.style.opacity = Math.random() * 0.55 + 0.25;
            container.appendChild(element);
            setTimeout(() => {
                if (element && element.remove) element.remove();
            }, 11000);
        }, 750); // реже, чем обычно, для элегантности
    }

    // Кнопка "немного сердечного волшебства" - запускает небольшое количество сердец и нежных искр
    function gentleHeartBurst() {
        const ambienceDiv = document.getElementById('floatingAmbient');
        if (!ambienceDiv) return;
        // всего 28 летящих объектов, из них 60% - звёзды/цветы, 40% - сердца (т.е. сердец ~10-12)
        const total = 28;
        for (let i = 0; i < total; i++) {
            setTimeout(() => {
                const fly = document.createElement('div');
                fly.classList.add('float-item');
                const isHeart = Math.random() < 0.4; // 40% сердец
                if (isHeart) {
                    const heartVar = ['❤️', '💖', '💗', '❤️‍🔥'];
                    fly.innerHTML = heartVar[Math.floor(Math.random() * heartVar.length)];
                } else {
                    const flowerStar = ['🌸', '🌼', '✨', '⭐', '🌺', '🍀', '🎈', '💫'];
                    fly.innerHTML = flowerStar[Math.floor(Math.random() * flowerStar.length)];
                }
                fly.style.fontSize = Math.random() * 28 + 16 + 'px';
                fly.style.left = Math.random() * 100 + '%';
                fly.style.animationDuration = Math.random() * 7 + 4 + 's';
                fly.style.opacity = Math.random() * 0.7 + 0.3;
                ambienceDiv.appendChild(fly);
                setTimeout(() => fly.remove(), 8000);
            }, i * 45);
        }
        // также покажем красивое уведомление
        const gentleMsg = document.createElement('div');
        gentleMsg.style.position = 'fixed';
        gentleMsg.style.top = '35%';
        gentleMsg.style.left = '50%';
        gentleMsg.style.transform = 'translate(-50%, -50%)';
        gentleMsg.style.background = 'rgba(255,248,245,0.96)';
        gentleMsg.style.padding = '12px 24px';
        gentleMsg.style.borderRadius = '50px';
        gentleMsg.style.fontWeight = '600';
        gentleMsg.style.fontSize = '1.15rem';
        gentleMsg.style.color = '#b3413b';
        gentleMsg.style.border = '1px solid #ffbebe';
        gentleMsg.style.zIndex = '10025';
        gentleMsg.style.backdropFilter = 'blur(10px)';
        gentleMsg.style.fontFamily = 'Quicksand, sans-serif';
        gentleMsg.style.whiteSpace = 'nowrap';
        gentleMsg.style.boxShadow = '0 5px 18px rgba(0,0,0,0.1)';
        document.body.appendChild(gentleMsg);
        setTimeout(() => {
            gentleMsg.style.opacity = '0';
            gentleMsg.style.transition = 'opacity 0.6s';
            setTimeout(() => gentleMsg.remove(), 700);
        }, 2100);
    }

    // Ротация тёплых фраз в loveMessage
    const tenderMessages = [
        "⭐ Пусть твоя жизнь сияет, как звёздное небо, полное чудес! ⭐",
        "🌹 Будь всегда окружёна заботой и нежностью. С днём рождения, родная! 🌹",
        "🍃 Пусть сбудутся самые заветные мечты, а любовь будет твоей главной силой! 🍃"
    ];
    let msgIndex = 0;
    function rotateTenderMessage() {
        const loveDiv = document.getElementById('loveMessage');
        if (loveDiv) {
            setInterval(() => {
                msgIndex = (msgIndex + 1) % tenderMessages.length;
                loveDiv.innerHTML = `<p>${tenderMessages[msgIndex]}</p>`;
                loveDiv.style.transform = 'scale(1.01)';
                setTimeout(() => { if(loveDiv) loveDiv.style.transform = 'scale(1)'; }, 250);
            }, 9000);
        }
    }

    // Мягкое появление искр при движении мыши (минимально, но романтично)
    let moveThrottle = null;
    function onMouseSpark(e) {
        if (moveThrottle) return;
        moveThrottle = setTimeout(() => {
            // редко, только иногда
            if (Math.random() > 0.75) {
                const sparkleDiv = document.createElement('div');
                sparkleDiv.className = 'cursor-spark';
                const options = ['🌸', '✨', '🍃', '🌼', '💫'];
                sparkleDiv.innerHTML = options[Math.floor(Math.random() * options.length)];
                sparkleDiv.style.left = e.clientX + 'px';
                sparkleDiv.style.top = e.clientY + 'px';
                sparkleDiv.style.fontSize = '16px';
                document.body.appendChild(sparkleDiv);
                setTimeout(() => sparkleDiv.remove(), 550);
            }
            moveThrottle = null;
        }, 80);
    }

    // Клик по фону (не по карточке и кнопке) тоже вызывает цветочек
    document.body.addEventListener('click', (e) => {
        if (!e.target.closest('.wish-card') && !e.target.closest('#burstGentleBtn')) {
            createMiniSpark(e.clientX, e.clientY);
            if (Math.random() > 0.7) createBlossomBurst(e.clientX, e.clientY);
        }
    });

    // Инициализация
    document.addEventListener('DOMContentLoaded', () => {
        buildWishes();
        startAmbientElements();
        rotateTenderMessage();
        const burstBtn = document.getElementById('burstGentleBtn');
        if (burstBtn) {
            burstBtn.addEventListener('click', (e) => {
                gentleHeartBurst();
                // дополнительно небольшой фейерверк вокруг кнопки
                const rect = burstBtn.getBoundingClientRect();
                for (let i = 0; i < 18; i++) {
                    createBlossomBurst(rect.left + rect.width/2 + (Math.random()-0.5)*40, rect.top + rect.height/2 + (Math.random()-0.5)*30);
                }
            });
        }
        window.addEventListener('mousemove', onMouseSpark);
        // добавим приветственную мягкую атмосферу (пару цветов)
        setTimeout(() => {
            const ambientDiv = document.getElementById('floatingAmbient');
            if(ambientDiv){
                for(let i=0;i<12;i++){
                    const welcomeFly = document.createElement('div');
                    welcomeFly.classList.add('float-item');
                    const nice = ['🌸', '🌼', '⭐', '🌿', '💫', '🍃'];
                    welcomeFly.innerHTML = nice[Math.floor(Math.random() * nice.length)];
                    welcomeFly.style.fontSize = (Math.random() * 20 + 14)+'px';
                    welcomeFly.style.left = Math.random() * 100 + '%';
                    welcomeFly.style.animationDuration = (Math.random() * 7 + 5)+'s';
                    welcomeFly.style.opacity = 0.5;
                    ambientDiv.appendChild(welcomeFly);
                    setTimeout(() => welcomeFly.remove(), 8000);
                }
            }
        }, 400);
    });
</script>
</body>
</html>
